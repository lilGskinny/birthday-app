<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Менеджер днів народження</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
    >
</head>

<body>

    <div class="container">

        <h1>Менеджер днів народження</h1>

        <div class="menu">

            <button
                class="menu-btn"
                onclick="toggleSection('monthSection')"
            >
                <span class="menu-btn-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75-1.5.75a3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0L3 16.5m15-3.379a48.474 48.474 0 0 0-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 0 1 3 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 0 1 6 13.12M12.265 3.11a.375.375 0 1 1-.53 0L12 2.845l.265.265Zm-3 0a.375.375 0 1 1-.53 0L9 2.845l.265.265Zm6 0a.375.375 0 1 1-.53 0L15 2.845l.265.265Z" />
                    </svg>
                </span>

                Іменинники поточного місяця
            </button>

            <div id="monthSection" class="hidden">
                <div id="monthList">
                    Тут буде список іменинників
                </div>
            </div>

            <button
                class="menu-btn"
                onclick="toggleSection('employeesSection')"
            >

                <span class="menu-btn-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
                    </svg>
                </span>

                Список співробітників
            </button>

            <div id="employeesSection" class="hidden">

                <div class="top-bar">

                    <input
                        id="nameInput"
                        placeholder="ПІБ"
                    >

                    <input
                        id="dateInput"
                        type="date"
                    >

                    <button
                        class="save-btn"
                        onclick="saveEmployee()"
                    >
                        Зберегти
                    </button>

                    <button
                        onclick="loadEmployees()"
                    >
                        Оновити
                    </button>

                    <input
                        id="search"
                        placeholder="Пошук..."
                        oninput="search()"
                    >

                </div>

                <table>

                    <thead>
                        <tr>
                            <th>№</th>
                            <th>ПІБ</th>
                            <th>Дата</th>
                            <th>Дії</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody"></tbody>

                </table>

            </div> <!-- employeesSection -->

        </div> <!-- menu -->

    </div> <!-- container -->

    <script src="script.js"></script>

</body>
</html>
